name: "scheduled-evolution"

# Consolidated scheduled self-evolution.
#
# Replaces the former daily / weekly / monthly / quarterly evolution workflows
# (~2,900 lines of duplicated inline bash) with a single lean workflow that
# drives the Python agent framework (agents.orchestrator). The cadence is
# expressed as multiple cron entries; the matching schedule is mapped to an
# evolution "scope" and handed to the orchestrator.

on:
  schedule:
    - cron: '0 3 * * *'          # daily      - consistency pass
    - cron: '0 6 * * 0'          # weekly     - deep health check (Sundays)
    - cron: '0 9 1 * *'          # monthly    - growth report (1st of month)
    - cron: '0 12 1 1,4,7,10 *'  # quarterly  - major evolution (start of quarter)
  workflow_dispatch:
    inputs:
      scope:
        description: 'Evolution scope to run'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - quarterly

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: scheduled-evolution
  cancel-in-progress: false

jobs:
  scheduled-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine evolution scope
        id: scope
        run: |
          scope="${{ github.event.inputs.scope }}"
          if [ -z "$scope" ]; then
            case "${{ github.event.schedule }}" in
              '0 3 * * *')         scope=daily ;;
              '0 6 * * 0')         scope=weekly ;;
              '0 9 1 * *')         scope=monthly ;;
              '0 12 1 1,4,7,10 *') scope=quarterly ;;
              *)                   scope=daily ;;
            esac
          fi
          echo "scope=$scope" >> "$GITHUB_OUTPUT"
          echo "Selected evolution scope: $scope"

      - name: Run scheduled evolution
        env:
          EVOLUTION_SCOPE: ${{ steps.scope.outputs.scope }}
        run: |
          python -m agents.orchestrator \
            --issue-number 0 \
            --issue-title "[EVOLUTION] Scheduled ${EVOLUTION_SCOPE} evolution" \
            --issue-body "Automated ${EVOLUTION_SCOPE} evolution run triggered on schedule." \
            --repository "${{ github.repository }}" \
            --branch-name "evolution-scheduled-${EVOLUTION_SCOPE}-${{ github.run_id }}"

      - name: Prepare triage on failure
        if: failure()
        run: |
          sudo apt-get update -y && sudo apt-get install -y unzip
          mkdir -p logs
          gh api \
            -H "Accept: application/zip" \
            repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/logs > logs.zip || true
          unzip -o logs.zip -d logs || true
          python scripts/triage_failure.py \
            --workflow-name "${{ github.workflow }}" \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --git-ref "${{ github.ref }}" \
            --commit-sha "${{ github.sha }}" \
            --logs-root logs \
            --tail-lines 200
